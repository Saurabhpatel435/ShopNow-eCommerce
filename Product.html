<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - ShopNow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">ShopNow</a>
    </div>
  </nav>

  <section class="container my-5">
    <h2 class="text-center mb-4">Our Products</h2>
    <div class="row g-4">

      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="image/Running shoes.jpg" class="card-img-top product-img" alt="Shoes">
          <div class="card-body text-center">
            <h5 class="card-title">Running Shoes</h5>
            <p class="fw-bold">₨ 3999</p>
            <button class="btn btn-dark btn-sm">Add to Cart</button>
          </div>
        </div>
      </div>

      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="image/Casual t-shirt.jpg" class="card-img-top product-img" alt="T-shirt">
          <div class="card-body text-center">
            <h5 class="card-title">Casual T-Shirt</h5>
            <p class="fw-bold">₨ 699</p>
            <button class="btn btn-dark btn-sm">Add to Cart</button>
          </div>
        </div>
      </div>

      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="image/Smart phone.jpg" class="card-img-top product-img" alt="Phone">
          <div class="card-body text-center">
            <h5 class="card-title">Smartphone</h5>
            <p class="fw-bold">₨ 30000</p>
            <button class="btn btn-dark btn-sm">Add to Cart</button>
          </div>
        </div>
      </div>

      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="image/book.jpg" class="card-img-top product-img" alt="Headphones">
          <div class="card-body text-center">
            <h5 class="card-title">Headphones</h5>
            <p class="fw-bold">₨ 3500</p>
            <button class="btn btn-dark btn-sm">Add to Cart</button>
          </div>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
